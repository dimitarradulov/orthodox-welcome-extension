<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <script type="module" src="../js/script.js" defer></script>
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="extension">
      <time class="clock select-none" data-selector="clock"></time>

      <article class="verse hidden" data-selector="verse-container">
        <h3 class="title">Verse of the Day ☦</h3>
        <p class="text-size-1 verse__text" data-selector="verse-text"></p>
        <p class="verse__ref" data-selector="verse-ref"></p>
      </article>

      <details class="prayer hidden" data-selector="prayer-container">
        <summary class="title select-none">Prayer ☦</summary>
        <p class="text-size-1" data-selector="prayer-text"></p>
      </details>
    </main>
  </body>
</html>
